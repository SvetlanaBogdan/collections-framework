name: Java CI with Maven

# Запуск CI при push и pull request
on: [push, pull_request]

jobs:
  build:

    # Используется виртуальная машина Ubuntu
    runs-on: ubuntu-latest

    steps:

      # Клонирование репозитория
      - uses: actions/checkout@v2

      # Установка Java 11
      - name: Set up JDK 11
        uses: actions/setup-java@v2
        with:
          java-version: '11'
          distribution: 'adopt'

      # Сборка проекта и запуск тестов Maven
      - name: Build with Maven
        run: mvn -B -e verify